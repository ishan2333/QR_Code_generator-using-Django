<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .hero{            
            height: 100vh;
            width: 100%;
            background: #A5C89E ;
        }
        .hello-div{
            height:30vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-div{
            height:30vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
        }
        .hello-div > h1 {
            color: white;
        }

        .result{
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hello-div">
            <h1>Hello {{ name }}</h1>
        </div>
        <div class="input-div">
            <h2>Please Enter the Text</h2>
            <input type="text" name="" id="">
        </div>
        <div class="result-div">
            <div class="result">

            </div>
        </div>
    </section>
</body>
</html>
